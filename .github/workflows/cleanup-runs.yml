name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: write

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d "${RETAIN_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)
          gh run list --repo "${GITHUB_REPOSITORY}" \
            --json databaseId,createdAt --limit 200 \
          | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM" \
              'sort_by(.createdAt) | reverse | .[$keep:] | .[] | select(.createdAt < $cutoff) | .databaseId' \
          | xargs -r -I{} gh run delete {} --repo "${GITHUB_REPOSITORY}"

  cleanup-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
    steps:
      - name: Delete old caches
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d "${RETAIN_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)
          gh api "repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100" \
            --jq '.actions_caches[] | {id, last_accessed_at}' \
          | jq -c --arg cutoff "$CUTOFF" 'select(.last_accessed_at < $cutoff) | .id' \
          | xargs -r -I{} gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/caches/{}"
